<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Clock for "when" -->
  <circle cx="100" cy="90" r="65" fill="#FDEBD0" stroke="#e67e22" stroke-width="3"/>
  <circle cx="100" cy="90" r="55" fill="white" stroke="#e67e22" stroke-width="2"/>
  <!-- Clock marks -->
  <line x1="100" y1="40" x2="100" y2="48" stroke="#333" stroke-width="3"/>
  <line x1="100" y1="132" x2="100" y2="140" stroke="#333" stroke-width="3"/>
  <line x1="48" y1="90" x2="56" y2="90" stroke="#333" stroke-width="3"/>
  <line x1="144" y1="90" x2="152" y2="90" stroke="#333" stroke-width="3"/>
  <!-- Hands -->
  <line x1="100" y1="90" x2="100" y2="55" stroke="#333" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="90" x2="130" y2="90" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="90" r="4" fill="#333"/>
  <!-- Question mark -->
  <text x="100" y="185" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="bold" fill="#e67e22">when?</text>
</svg>
