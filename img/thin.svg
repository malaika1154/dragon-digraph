<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Thin stick figure -->
  <circle cx="100" cy="40" r="18" fill="#FFDBB4" stroke="#D4A574" stroke-width="2"/>
  <!-- Thin body -->
  <line x1="100" y1="58" x2="100" y2="130" stroke="#555" stroke-width="3"/>
  <!-- Arms -->
  <line x1="100" y1="80" x2="70" y2="105" stroke="#555" stroke-width="3"/>
  <line x1="100" y1="80" x2="130" y2="105" stroke="#555" stroke-width="3"/>
  <!-- Legs -->
  <line x1="100" y1="130" x2="75" y2="170" stroke="#555" stroke-width="3"/>
  <line x1="100" y1="130" x2="125" y2="170" stroke="#555" stroke-width="3"/>
  <!-- Arrows showing thin width -->
  <line x1="50" y1="90" x2="65" y2="90" stroke="#2c3e50" stroke-width="2" marker-end="url(#ar3)"/>
  <line x1="150" y1="90" x2="135" y2="90" stroke="#2c3e50" stroke-width="2" marker-end="url(#ar3)"/>
  <defs><marker id="ar3" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2c3e50"/></marker></defs>
  <!-- Smile -->
  <circle cx="93" cy="36" r="3" fill="#333"/>
  <circle cx="107" cy="36" r="3" fill="#333"/>
  <path d="M 92 46 Q 100 54 108 46" fill="none" stroke="#333" stroke-width="2"/>
</svg>
