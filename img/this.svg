<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Hand pointing "this" -->
  <circle cx="100" cy="80" r="55" fill="#E8F4FD" stroke="#2980b9" stroke-width="3"/>
  <!-- Pointing finger -->
  <rect x="90" y="50" width="20" height="50" rx="8" fill="#FFDBB4" stroke="#D4A574" stroke-width="2"/>
  <circle cx="100" cy="45" r="10" fill="#FFDBB4" stroke="#D4A574" stroke-width="2"/>
  <!-- Arrow pointing down -->
  <line x1="100" y1="110" x2="100" y2="145" stroke="#2c3e50" stroke-width="4" marker-end="url(#ar1)"/>
  <defs><marker id="ar1" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#2c3e50"/></marker></defs>
  <text x="100" y="175" text-anchor="middle" font-family="sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">THIS</text>
</svg>
